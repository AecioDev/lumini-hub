version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumini_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/migrations/create_database.sql:/docker-entrypoint-initdb.d/create_database.sql

volumes:
  postgres_data:
